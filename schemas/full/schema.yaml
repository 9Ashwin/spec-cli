name: full
version: 1
description: >
  Complete 5-phase development workflow: open → design → build → verify → archive.
  OpenSpec handles WHAT (proposals, specs, archives).
  Superpowers handles HOW (design, planning, execution).

workflows:
  full:
    description: Standard 5-phase workflow with deep design
    phases:
      - open
      - design
      - build
      - verify
      - archive
  hotfix:
    description: Quick bug fix, skips design phase
    phases:
      - open
      - build
      - verify
      - archive
  tweak:
    description: Small change, skips design and full plan
    phases:
      - open
      - build
      - verify
      - archive

phases:
  open:
    description: Create proposal, design doc, and task list
    owner: OpenSpec
    skill: comet-open
    entry_checks:
      - .openspec.yaml exists
      - proposal.md exists
    guard_checks:
      - design.md must not be empty for full workflow
      - tasks.md must exist

  design:
    description: Deep design via Superpowers brainstorming
    owner: Superpowers
    skill: comet-design
    entry_checks:
      - phase must be design
      - design_doc must be set (full workflow)
      - handoff_context must exist (full workflow)
    guard_checks:
      - design_doc file must exist (full workflow)
      - handoff_hash must be valid sha256 (full workflow)

  build:
    description: Plan and implement via subagent-driven development
    owner: Superpowers
    skill: comet-build
    entry_checks:
      - phase must be build
      - isolation must be set
      - build_mode must be set
    guard_checks:
      - isolation must be branch or worktree
      - build_mode must be selected
      - direct_override must be true if build_mode is direct (full workflow)

  verify:
    description: Verify completion, run tests, handle branch
    owner: Both
    skill: comet-verify
    entry_checks:
      - phase must be verify
      - verify_result must be pending
    guard_checks:
      - verification_report must exist (for verify-pass)
      - branch_status must be handled (for verify-pass)

  archive:
    description: Sync delta specs, archive change
    owner: OpenSpec
    skill: comet-archive
    entry_checks:
      - phase must be archive
      - archived must be false
    guard_checks:
      - delta specs synced to main specs
      - change moved to archive directory

transitions:
  open-complete:
    from: open
    to:
      full: design
      hotfix: build
      tweak: build

  design-complete:
    from: design
    to:
      full: build

  build-complete:
    from: build
    to:
      full: verify
      hotfix: verify
      tweak: verify

  verify-pass:
    from: verify
    to:
      full: archive
      hotfix: archive
      tweak: archive

  verify-fail:
    from: verify
    to:
      full: build
      hotfix: build
      tweak: build

fields:
  workflow:
    type: enum
    values: [full, hotfix, tweak]
    default: full

  phase:
    type: enum
    values: [open, design, build, verify, archive]
    default: open

  build_mode:
    type: enum
    values: [subagent-driven-development, direct]
    default: null

  isolation:
    type: enum
    values: [branch, worktree]
    default: null

  verify_mode:
    type: enum
    values: [full, light]
    default: null

  verify_result:
    type: enum
    values: [pending, pass, fail]
    default: pending

  branch_status:
    type: enum
    values: [pending, handled]
    default: pending

  archived:
    type: boolean
    default: false

  direct_override:
    type: boolean
    default: false

  design_doc:
    type: path

  plan:
    type: path

  verification_report:
    type: path

  handoff_context:
    type: path

  handoff_hash:
    type: sha256

  build_command:
    type: string

  verify_command:
    type: string
